name: "Deploy to GitHub Pages"
on:
  push:
    branches: [ main ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Directories
        run: |
          mkdir -p build/web

      - name: Debug Godot Version & Templates
        run: |
          godot --version
          ls -la ~/.local/share/godot/export_templates/ || true
          ls -la ~/.local/share/godot/templates/ || true

      - name: Export Game
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: Add coi-service-worker for SharedArrayBuffer
        run: |
          git clone https://github.com/gzuidhof/coi-serviceworker.git
          mv coi-serviceworker/coi-serviceworker.js build/web/coi-serviceworker.js
          sed -i 's/<head>/<head><script src="coi-serviceworker.js"><\/script>/g' build/web/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
