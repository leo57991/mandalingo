name: "Deploy to GitHub Pages"
on:
  push:
    branches: [ main ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Directories
        run: |
          mkdir -p build/web

      - name: Debug and Export Game
        run: |
          echo "=== Godot Version ===" > export_log.txt
          godot --version >> export_log.txt 2>&1 || true
          echo "=== Export Templates ===" >> export_log.txt
          ls -la ~/.local/share/godot/export_templates/ >> export_log.txt 2>&1 || true
          ls -la ~/.local/share/godot/templates/ >> export_log.txt 2>&1 || true
          echo "=== Exporting ===" >> export_log.txt
          godot --headless --export-release "Web" build/web/index.html >> export_log.txt 2>&1

      - name: Write Logs to Summary
        if: always()
        run: |
          echo "### Build and Export Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat export_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Add coi-service-worker for SharedArrayBuffer
        run: |
          git clone https://github.com/gzuidhof/coi-serviceworker.git
          mv coi-serviceworker/coi-serviceworker.js build/web/coi-serviceworker.js
          sed -i 's/<head>/<head><script src="coi-serviceworker.js"><\/script>/g' build/web/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
