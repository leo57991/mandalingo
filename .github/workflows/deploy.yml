name: "Deploy to GitHub Pages"
on:
  push:
    branches: [ main ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Missing Dependencies
        run: |
          apt-get update && apt-get install -y libfontconfig1

      - name: Setup Build Directories
        run: |
          mkdir -p build/web

      - name: Setup Export Templates
        run: |
          GODOT_VERSION=$(godot --version 2>/dev/null | head -1 | sed 's/\.[a-z].*//') || true
          echo "Detected Godot version prefix: $GODOT_VERSION"
          mkdir -p ~/.local/share/godot/export_templates/
          # Copy from the container's pre-installed location
          if [ -d "/root/.local/share/godot/export_templates/" ]; then
            cp -r /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/ || true
          fi
          echo "=== Export Templates Available ==="
          find ~/.local/share/godot/export_templates/ -maxdepth 2 -type f | head -20 || true

      - name: Import Project Assets
        run: |
          echo "=== Importing project (generates .godot/imported/) ==="
          godot --headless --import 2>&1 || true
          echo "=== Import complete ==="

      - name: Export Game
        run: |
          echo "=== Godot Version ===" > export_log.txt
          godot --version >> export_log.txt 2>&1 || true
          echo "=== Exporting ===" >> export_log.txt
          godot --headless --export-release "Web" build/web/index.html >> export_log.txt 2>&1
          EXPORT_EXIT=$?
          echo "=== Export exit code: $EXPORT_EXIT ===" >> export_log.txt
          # Verify output exists
          if [ ! -f "build/web/index.html" ]; then
            echo "ERROR: index.html was not generated!" >> export_log.txt
            cat export_log.txt
            exit 1
          fi
          echo "=== Export successful, index.html exists ==="

      - name: Write Logs to Summary
        if: always()
        run: |
          echo "### Build and Export Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat export_log.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no log file)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Add coi-service-worker for SharedArrayBuffer
        run: |
          git clone https://github.com/gzuidhof/coi-serviceworker.git
          mv coi-serviceworker/coi-serviceworker.js build/web/coi-serviceworker.js
          sed -i 's/<head>/<head><script src="coi-serviceworker.js"><\/script>/g' build/web/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
